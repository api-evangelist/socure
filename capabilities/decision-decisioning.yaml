naftiko: 1.0.0-alpha2
info:
  label: Socure Decision — Decisioning
  description: Socure Decision capability. Invokes the Decision module alongside other ID+ modules to retrieve a
    deterministic accept/reject/review/refer/resubmit outcome.
  tags:
  - Socure
  - Decisioning
  - Rules Engine
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    SOCURE_API_KEY: SOCURE_API_KEY
capability:
  consumes:
  - type: http
    namespace: decision
    baseUri: https://api.socure.com
    description: Socure Decision business capability.
    resources:
    - name: decision-evaluate
      path: /api/3.0/EmailAuthScore
      operations:
      - name: evaluateDecision
        method: POST
        description: Socure Evaluate A Decision
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: 'SocureApiKey {{env.SOCURE_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: decision-rest
    port: 8080
    resources:
    - path: /v1/decision/evaluate
      name: decision-evaluate
      operations:
      - method: POST
        name: evaluateDecision
        description: Socure Evaluate A Decision
        call: decision.evaluateDecision
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: decision-mcp
    port: 9090
    transport: http
    tools:
    - name: socure-evaluate-decision
      description: Socure Evaluate A Decision
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: decision.evaluateDecision
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
